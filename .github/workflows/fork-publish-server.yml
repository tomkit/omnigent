# Fork-owned server image publish (tomkit).
#
# WHY THIS EXISTS: the upstream `Publish images (public)` workflow
# (.github/workflows/oss-publish-images.yml) is gated to
# `github.repository == 'omnigent-ai/omnigent'`, so it is INERT in this fork —
# it never publishes anything to our namespace. Without this workflow the
# `omnigent-tomkit` Fly app keeps pulling the UPSTREAM
# `ghcr.io/omnigent-ai/omnigent-server:latest`, which OVERWRITES our merged
# fork patches (idle-suspend/reclaim-retention, bidirectional context sync) on
# every redeploy. This workflow builds the SAME server image from
# `deploy/docker/Dockerfile` and publishes it to OUR GHCR namespace so the fork
# code actually runs in production.
#
# Self-contained: GHCR auth uses the built-in `GITHUB_TOKEN` (no org secrets).
# The optional Fly auto-deploy leg is fully gated on a `FLY_API_TOKEN` repo
# secret existing — with no secret it is inert, so this is safe to merge before
# any secret is wired and CI still passes.
#
# Tag scheme (deliberately minimal vs upstream's release/rc/nightly matrix —
# the fork tracks main, not semver releases):
#   :sha-<short>   immutable per-commit pin, published on every build. Deploys
#                  pin to this so a redeploy is reproducible.
#   :latest        moves to the newest main build. `fly.tomkit.toml` points here.
#
# FIRST RUN creates the `omnigent-server` package PRIVATE under the user's GHCR
# packages. Flip it to PUBLIC once in the package settings so Fly can pull it
# unauthenticated (cannot be done from CI). See deploy/fly/RUNBOOK.tomkit.md.
name: Publish fork server image

on:
  push:
    branches: [main]
    # Only rebuild when something that lands in the image changes (mirrors the
    # upstream workflow's path filter).
    paths:
      - 'deploy/docker/Dockerfile'
      - 'deploy/docker/entrypoint.py'
      - 'omnigent/**'
      - 'ap-web/**'
      - 'sdks/**'
      - 'pyproject.toml'
      - 'setup.py'
      - 'uv.lock'
      - 'ap-web/package-lock.json'
      - '.github/workflows/fork-publish-server.yml'
  workflow_dispatch: {}

# Read-only at the top level; write scopes live on the jobs below.
permissions:
  contents: read

concurrency:
  # Key by SHA so back-to-back merges each build; don't cancel mid-push.
  group: fork-publish-server-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build-and-push:
    # Gated to THIS fork; inert in upstream and in forks-of-the-fork.
    if: github.repository == 'tomkit/omnigent'
    permissions:
      contents: read
      packages: write # push the image to GHCR via GITHUB_TOKEN
    runs-on: ubuntu-latest
    # Multi-arch: the linux/arm64 leg cross-builds under QEMU emulation on this
    # amd64 runner, which roughly doubles build time. Give it headroom.
    timeout-minutes: 60
    outputs:
      short-sha: ${{ steps.tags.outputs.short_sha }}
      digest: ${{ steps.build-server.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Register binfmt handlers so Buildx can cross-build the linux/arm64
      # variant on this amd64 runner (emulated).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute the tag set. The owner is lower-cased because GHCR repository
      # paths must be lowercase (github.repository_owner can contain uppercase).
      - name: Compute image tags
        id: tags
        env:
          GH_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          OWNER_LC=$(echo "${GH_OWNER}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/omnigent-server"
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tags=${IMAGE}:sha-${SHORT_SHA},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "Publishing: ${IMAGE}:sha-${SHORT_SHA} + ${IMAGE}:latest"

      # No build-args: the Dockerfile ARGs default to public registries (matches
      # the upstream server build). Multi-arch manifest list (amd64 + arm64);
      # the Fly machine is amd64 and pulls the amd64 variant from the list.
      - name: Build and push
        id: build-server
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: true

  # OPTIONAL auto-deploy leg. Fully GATED on a FLY_API_TOKEN repo secret: the
  # `secrets` context is not available in job/step `if:`, so the secret is
  # mapped to an env var and a guard step decides whether to proceed. With no
  # secret the job runs but every real step is skipped — nothing mutates the
  # live app, and CI stays green. To ENABLE: add a `FLY_API_TOKEN` repo secret
  # (`fly tokens create deploy -a omnigent-tomkit`). See RUNBOOK.tomkit.md.
  deploy-fly:
    needs: build-and-push
    if: github.repository == 'tomkit/omnigent'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      IMAGE_REF: ghcr.io/tomkit/omnigent-server:sha-${{ needs.build-and-push.outputs.short-sha }}
    steps:
      - name: Decide whether to deploy
        id: gate
        run: |
          set -euo pipefail
          if [ -z "${FLY_API_TOKEN:-}" ]; then
            echo "FLY_API_TOKEN not set — auto-deploy disabled (this is the safe default)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "FLY_API_TOKEN present — will deploy ${IMAGE_REF}."
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up flyctl
        if: steps.gate.outputs.enabled == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be  # v1.5

      # Deploys the immutable per-commit image. Preserves the live machine's
      # volume mount, internal port, and health checks because fly.tomkit.toml
      # mirrors them exactly and `fly deploy` only swaps the image. Requires the
      # GHCR package to be PUBLIC (or Fly registry creds configured) so the
      # remote builder can pull it.
      - name: Deploy to Fly
        if: steps.gate.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          flyctl deploy \
            --config deploy/fly/fly.tomkit.toml \
            --app omnigent-tomkit \
            --image "${IMAGE_REF}"
